<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #2678b6; color: white; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <h3>บันทึกรายจ่าย</h3>
    <input type="text" id="item" placeholder="ชื่อรายการ">
    <input type="number" id="amount" placeholder="ราคา">
    <button onclick="save()">บันทึกข้อมูล</button>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function save() {
            let item = document.getElementById('item').value;
            let amount = document.getElementById('amount').value;
            tg.sendData(item + "," + amount);
        }
    </script>
</body>
</html>
